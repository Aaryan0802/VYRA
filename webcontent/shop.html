<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/static/logo.png">
<title>Vyra | The Boutique</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- CORE BRAND COLORS --- */
:root {
    --gold: #cfaa6a;
    --gold-light: #e6d1a8;
    --gold-glow: rgba(207, 170, 106, 0.2);
    --glass: rgba(10, 10, 10, 0.8);
    --border: rgba(207, 170, 106, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

body {
    min-height: 100vh;
    background: #050505;
    background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("/static/story.png");
    background-size: cover; background-position: center; background-attachment: fixed;
    color: #f4f4f4;
    overflow-x: hidden;
}

/* --- IDENTICAL NAVIGATION BAR --- */
.top-nav {
    position: fixed; top: 0; width: 100%; padding: 25px 50px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
}

.nav-link-custom {
    color: var(--gold); text-decoration: none; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; transition: 0.3s;
}
.nav-link-custom:hover { color: white; }

/* --- HERO SECTION: GENDER SELECTION --- */
#gender-section {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    animation: fadeIn 1.2s ease;
}

.brand-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 80px; letter-spacing: 15px;
    color: var(--gold); margin-bottom: 10px;
}

.hero-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-style: italic;
    letter-spacing: 4px; opacity: 0.8; margin-bottom: 60px;
}

.gender-grid { display: flex; gap: 40px; }

.gender-btn {
    width: 280px; padding: 60px 0;
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(15px);
    color: var(--gold);
    font-size: 14px; letter-spacing: 6px;
    cursor: pointer; transition: 0.5s;
    text-transform: uppercase;
}

.gender-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 30px var(--gold-glow);
    transform: translateY(-5px);
    color: white;
}

/* --- CATEGORY COLLECTION VIEW --- */
#category-section {
    display: none;
    padding: 160px 50px 100px;
    animation: fadeIn 0.8s ease;
}

.section-header { text-align: center; margin-bottom: 80px; }

.collection-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px; letter-spacing: 3px;
    color: var(--gold); margin-bottom: 10px;
}

.collection-container {
    max-width: 1300px; margin: auto;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px;
}

/* CATEGORY CARDS (Identical Card Style) */
.category-card {
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    transition: 0.5s;
    overflow: hidden;
}

.category-card:hover {
    border-color: var(--gold);
    transform: translateY(-10px);
}

.category-card img {
    width: 100%; height: 350px;
    object-fit: cover; opacity: 0.7;
    transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
}

.category-card:hover img { opacity: 1; transform: scale(1.05); }

.card-label {
    padding: 30px; text-align: center;
    background: rgba(0,0,0,0.5);
}

.card-label h3 {
    font-family: 'Playfair Display', serif;
    letter-spacing: 4px; font-size: 18px; color: var(--gold);
}

/* DROPDOWN MENU */
.perfume-dropdown {
    max-height: 0; overflow: hidden;
    transition: max-height 0.6s ease;
    background: rgba(0,0,0,0.9);
}

.category-card.active .perfume-dropdown { max-height: 400px; }

.perfume-link {
    display: block; padding: 20px;
    color: white; text-decoration: none;
    font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; text-align: center;
    border-top: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
}

.perfume-link:hover { color: var(--gold); background: rgba(207,170,106,0.05); }

/* --- NAVIGATION BUTTONS --- */
.nav-footer {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%); display: flex; gap: 20px;
}

.btn-minimal {
    background: var(--glass);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 30px; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: 0.4s;
}

.btn-minimal:hover { background: var(--gold); color: black; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
    .brand-hero-title { font-size: 40px; }
    .gender-grid { flex-direction: column; }
    .gender-btn { width: 80vw; }
}
</style>
</head>

<body>

<nav class="top-nav">
    <a href="index.html" class="nav-link-custom"><i class="fas fa-home me-2"></i> Main</a>
    <div style="letter-spacing: 8px; color: var(--gold); font-family: 'Playfair Display'; font-weight: 600;">VYRA</div>
    <a href="account.html?tab=cart" class="nav-link-custom">Collection <i class="fas fa-shopping-bag ms-2"></i></a>
</nav>

<div id="gender-section">
    <h1 class="brand-hero-title">VYRA</h1>
    <p class="hero-tagline">Define Your Olfactory Identity</p>

    <div class="gender-grid">
        <button class="gender-btn" onclick="showCategories('Male')">Masculine</button>
        <button class="gender-btn" onclick="showCategories('Female')">Feminine</button>
    </div>
</div>

<div id="category-section">
    <div class="section-header">
        <h1 id="dynamic-collection-title" class="collection-title">THE COLLECTION</h1>
        <p style="font-size: 10px; letter-spacing: 4px; opacity: 0.5;">SELECT A FAMILY TO DISCOVER</p>
    </div>

    <div class="collection-container">
        </div>

    <div class="nav-footer">
        <button id="back-to-gender-btn" class="btn-minimal" onclick="showGenders()">
            <i class="fas fa-arrow-left me-2"></i> Switch Identity
        </button>
    </div>
</div>

<script>
let currentGender = 'Unisex';

function showCategories(gender) {
    currentGender = gender; 
    document.getElementById('dynamic-collection-title').innerText = `${gender.toUpperCase()} ESSENCES`;
    document.getElementById('gender-section').style.display = 'none';
    document.getElementById('category-section').style.display = 'block';
    
    loadShopCollection();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showGenders() {
    document.getElementById('category-section').style.display = 'none';
    document.getElementById('gender-section').style.display = 'flex';
}

function toggleBox(element) {
    const allBoxes = document.querySelectorAll('.category-card');
    allBoxes.forEach(box => { if (box !== element) box.classList.remove('active'); });
    element.classList.toggle("active");
}

async function loadShopCollection() {
    try {
        const res = await fetch(`http://localhost:3000/api/products?gender=${currentGender}`);
        const products = await res.json();
        const container = document.querySelector('.collection-container');
        container.innerHTML = ''; 

        const categories = {};
        products.forEach(product => {
            if (!categories[product.category]) {
                categories[product.category] = { image: product.image_url, perfumes: [] };
            }
            categories[product.category].perfumes.push(product);
        });

        for (const [categoryName, data] of Object.entries(categories)) {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.setAttribute('onclick', 'toggleBox(this)');
            
            let linksHTML = '';
            data.perfumes.forEach(p => {
                linksHTML += `<a href="product.html?id=${p.id}" class="perfume-link">${p.name}</a>`;
            });

            card.innerHTML = `
                <img src="http://localhost:3000${data.image}" alt="${categoryName}">
                <div class="card-label">
                    <h3>${categoryName.toUpperCase()}</h3>
                </div>
                <div class="perfume-dropdown">
                    ${linksHTML}
                </div>`;
            container.appendChild(card);
        }
    } catch (error) { console.error("Error loading products:", error); }
}

// Cinematic Fade-in on load
window.addEventListener('load', () => {
    document.body.style.opacity = '1';
});
</script>

</body>
</html>
