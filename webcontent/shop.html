<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/static/logo.png">
<title>Vyra | The Boutique</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --gold: #cfaa6a;
        --glass: rgba(10, 10, 10, 0.8);
        --border: rgba(207, 170, 106, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

    body {
        min-height: 100vh;
        background: #050505;
        background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("/static/story.png");
        background-size: cover; background-position: center; background-attachment: fixed;
        color: #f4f4f4; overflow-x: hidden;
    }

    /* --- Identical Navigation Bar --- */
    .top-nav {
        position: fixed; top: 0; width: 100%; padding: 25px 50px;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    }

    .nav-link-custom {
        color: var(--gold); text-decoration: none; font-size: 11px;
        letter-spacing: 2px; text-transform: uppercase; transition: 0.3s;
    }
    .nav-link-custom:hover { color: white; }

    /* --- Catalog Layout --- */
    .catalog-wrapper { padding: 140px 50px 100px; max-width: 1400px; margin: auto; }

    .catalog-header { text-align: center; margin-bottom: 60px; }
    .catalog-title { font-family: 'Playfair Display', serif; font-size: 42px; letter-spacing: 6px; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
    
    /* --- Sleek Filter Bar --- */
    .filter-bar {
        display: flex; justify-content: center; gap: 40px; margin-bottom: 60px;
        border-bottom: 1px solid var(--border); padding-bottom: 20px;
    }
    .filter-btn {
        background: transparent; border: none; color: rgba(255,255,255,0.5);
        font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
        transition: 0.3s;
    }
    .filter-btn:hover, .filter-btn.active { color: var(--gold); }

    /* --- Clickable Category Cards --- */
    .collection-container {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 40px;
    }

    .category-card {
        background: var(--glass); border: 1px solid var(--border);
        backdrop-filter: blur(10px); transition: 0.5s; overflow: hidden;
    }
    .category-card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

    .category-card img {
        width: 100%; height: 350px; object-fit: cover; opacity: 0.7;
        transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .category-card:hover img { opacity: 1; transform: scale(1.05); }

    .card-label {
        padding: 30px; text-align: center; background: rgba(0,0,0,0.7);
        border-top: 1px solid var(--border);
    }
    .card-label h3 {
        font-family: 'Playfair Display', serif; letter-spacing: 4px;
        font-size: 18px; color: var(--gold); margin: 0; text-transform: uppercase;
    }

    /* --- Accordion Dropdown --- */
    .perfume-dropdown {
        max-height: 0; overflow: hidden; transition: max-height 0.6s ease;
        background: rgba(0,0,0,0.95);
    }
    .category-card.active .perfume-dropdown { max-height: 500px; border-top: 1px solid var(--border); }

    .perfume-link {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 30px; color: white; text-decoration: none;
        font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
    }
    .perfume-link:last-child { border-bottom: none; }
    .perfume-link:hover { color: var(--gold); background: rgba(207,170,106,0.05); padding-left: 40px; }
    .perfume-price { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 14px; }

    /* Animations */
    #page-transition { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #050505; z-index: 999999; pointer-events: none; opacity: 1; transition: opacity 0.8s ease; }
    body.page-loaded #page-transition { opacity: 0; }
</style>
</head>

<body>
<div id="page-transition"></div>

<nav class="top-nav">
    <a href="index.html" class="nav-link-custom"><i class="fas fa-home me-2"></i> The Maison</a>
    <a href="index.html" style="letter-spacing: 8px; color: var(--gold); font-family: 'Playfair Display'; font-weight: 600; text-decoration: none;">VYRA</a>
    <a href="account.html?tab=cart" class="nav-link-custom">My Portal <i class="fas fa-shopping-bag ms-2"></i></a>
</nav>

<div class="catalog-wrapper">
    <div class="catalog-header">
        <h1 class="catalog-title">The Boutique</h1>
        <p style="font-size: 11px; letter-spacing: 4px; opacity: 0.6; text-transform: uppercase;">Select a family to discover</p>
    </div>

    <div class="filter-bar" id="identityFilters">
        <button class="filter-btn active" onclick="filterProducts('All', this)">All Identities</button>
        <button class="filter-btn" onclick="filterProducts('Male', this)">Masculine</button>
        <button class="filter-btn" onclick="filterProducts('Female', this)">Feminine</button>
        <!-- <button class="filter-btn" onclick="filterProducts('Unisex', this)">Unisex</button> -->
    </div>

    <div class="collection-container" id="catalogContainer">
        </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>

    let allProducts = [];

    // --- Fetch Products ---
    async function loadCatalog() {
        try {
            const res = await fetch("/api/products");
            const data = await res.json();
            
            allProducts = Array.isArray(data) ? data : [];
            checkUrlForFilters();
        } catch (error) { 
            console.error("Error loading products:", error); 
        }
    }

    function checkUrlForFilters() {
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('cat'); 

        if (categoryParam) {
            // Filter by Scent Family (Signature, Exclusives, Heritage) from Landing Page
            const filtered = allProducts.filter(p => p.category && p.category.toLowerCase() === categoryParam.toLowerCase());
            renderCategoryCards(filtered);
            document.querySelector('.catalog-title').innerText = categoryParam.toUpperCase() + " COLLECTION";
            document.getElementById('identityFilters').style.display = 'none';
        } else {
            renderCategoryCards(allProducts);
        }
    }

    // --- Render Clickable Category Cards ---
    function renderCategoryCards(products) {
        const container = document.getElementById('catalogContainer');
        container.innerHTML = ''; 

        if(!products || products.length === 0) {
            container.innerHTML = '<p style="color:white; text-align:center; opacity: 0.5; font-size: 14px; letter-spacing: 2px; grid-column: 1 / -1; margin-top: 50px;">No essences found for this selection.</p>';
            return;
        }

        // Group products by their Category (Woody, Floral, Citrus, etc.)
        const categories = {};
        products.forEach(product => {
            const cat = product.category || 'Uncategorized';
            if (!categories[cat]) {
                // Dynamically build the dedicated category image path
                // This converts "Floral" to "category_floral.png"
                const formattedCatName = cat.toLowerCase().replace(/\s+/g, '_');
                categories[cat] = { image: `/uploads/category_${formattedCatName}.png`, perfumes: [] };
            }
            categories[cat].perfumes.push(product);
        });

        // Build the HTML for each category card
        for (const [categoryName, data] of Object.entries(categories)) {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.setAttribute('onclick', 'toggleBox(this)');
            
            let linksHTML = '';
            data.perfumes.forEach(p => {
                linksHTML += `
                    <a href="product.html?id=${p.id}" class="perfume-link">
                        <span>${p.name} <span style="opacity: 0.5; font-size: 9px; margin-left: 10px;">${p.gender}</span></span>
                        <span class="perfume-price">₹${p.price}</span>
                    </a>
                `;
            });

            // Make sure the image path is perfectly formatted
            const imgPath = data.image.startsWith('/') ? data.image : '/' + data.image;

            card.innerHTML = `
                <img src="${imgPath}" alt="${categoryName}">
                <div class="card-label">
                    <h3>${categoryName} ESSENCES</h3>
                </div>
                <div class="perfume-dropdown">
                    ${linksHTML}
                </div>`;
                
            container.appendChild(card);
        }
    }

    // --- Accordion Toggle Logic ---
    function toggleBox(element) {
        const allBoxes = document.querySelectorAll('.category-card');
        allBoxes.forEach(box => { 
            // Close other boxes
            if (box !== element) box.classList.remove('active'); 
        });
        // Toggle the clicked box
        element.classList.toggle("active");
    }

    // --- Filter Bar Logic (Masculine/Feminine) ---
    function filterProducts(gender, btnElement) {
        window.history.replaceState({}, document.title, window.location.pathname);
        document.querySelector('.catalog-title').innerText = "THE BOUTIQUE";

        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        if (gender === 'All') {
            renderCategoryCards(allProducts);
        } else {
            const filtered = allProducts.filter(p => p.gender && p.gender.toLowerCase() === gender.toLowerCase());
            renderCategoryCards(filtered);
        }
    }

    // Initialize
    window.addEventListener('load', () => {
        loadCatalog();
    });

    // Cinematic Transitions
    window.addEventListener('pageshow', () => { document.body.classList.add('page-loaded'); });
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            // Prevent the parent card's 'onclick' from firing when a link is clicked
            e.stopPropagation(); 
            
            const href = this.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
            e.preventDefault();
            document.body.classList.remove('page-loaded');
            setTimeout(() => { window.location.href = href; }, 500); 
        });
    });
</script>

</body>
</html>
