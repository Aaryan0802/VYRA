<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyra | Essence Details</title>

    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #cfaa6a;
            --gold-light: #e6d1a8;
            --gold-glow: rgba(207, 170, 106, 0.2);
            --glass: rgba(10, 10, 10, 0.75);
            --border: rgba(207, 170, 106, 0.15);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat', sans-serif; }
        
        body {
            background: #050505;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("/static/story.png");
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #f4f4f4;
            overflow-x: hidden;
        }

        /* --- Global Navigation (Identical to Account Page) --- */
        .top-nav {
            position: fixed; top: 0; width: 100%; padding: 25px 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }

        .nav-link-custom {
            color: var(--gold); text-decoration: none; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase; transition: 0.3s;
        }
        .nav-link-custom:hover { color: white; }

        /* --- Cinematic Transition --- */
        #page-transition {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050505; z-index: 999999; pointer-events: none;
            opacity: 1; transition: opacity 0.8s ease;
        }
        body.page-loaded #page-transition { opacity: 0; }

        /* --- Product Layout --- */
        .product-wrapper {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 120px 20px 60px;
        }

        .product-glass-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 2px;
            max-width: 1200px; width: 100%; display: flex; flex-wrap: wrap;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .image-side {
            flex: 1 1 500px; padding: 60px; display: flex;
            align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02);
        }

        .image-side img {
            width: 100%; max-width: 450px; border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .image-side:hover img { transform: scale(1.05); }

        .details-side { flex: 1 1 400px; padding: 60px; position: relative; }

        .brand-label {
            font-size: 10px; letter-spacing: 4px; color: var(--gold);
            margin-bottom: 15px; text-transform: uppercase; opacity: 0.8;
        }

        .product-title {
            font-family: 'Playfair Display', serif; font-size: 48px;
            letter-spacing: 2px; color: white; margin-bottom: 10px;
        }

        .category-tag {
            font-size: 11px; letter-spacing: 2px; color: var(--gold);
            text-transform: uppercase; margin-bottom: 30px; display: block;
        }

        .product-price { font-size: 32px; font-weight: 300; margin-bottom: 30px; color: white; }

        .fragrance-notes {
            margin-bottom: 40px; padding-left: 20px;
            border-left: 1px solid var(--gold); line-height: 1.8;
        }
        .fragrance-notes span { color: var(--gold); font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* --- Interactive Elements --- */
        .qty-selector {
            display: flex; align-items: center; gap: 20px; margin-bottom: 40px;
        }
        .qty-btn {
            background: transparent; border: 1px solid var(--border);
            color: white; width: 35px; height: 35px; cursor: pointer; transition: 0.3s;
        }
        .qty-btn:hover { border-color: var(--gold); color: var(--gold); }

        .button-stack { display: flex; gap: 20px; }
        
        .btn-vyra {
            flex: 1; padding: 18px; text-transform: uppercase;
            letter-spacing: 2px; font-weight: 600; font-size: 12px;
            cursor: pointer; transition: 0.4s; border: 1px solid var(--gold);
            border-radius: 0;
        }

        .btn-outline { background: transparent; color: var(--gold); }
        .btn-fill { background: var(--gold); color: black; }
        
        .btn-vyra:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(207,170,106,0.2); }
        .btn-fill:hover { background: white; border-color: white; }

        /* --- Luxury Toast --- */
        #luxury-toast {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--gold); padding: 20px 40px;
            color: white; z-index: 10000; transform: translateY(200%);
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        }
        #luxury-toast.show { transform: translateY(0); }

        @media (max-width: 992px) {
            .image-side, .details-side { padding: 40px; text-align: center; }
            .fragrance-notes { border-left: none; padding-left: 0; }
            .qty-selector { justify-content: center; }
            .top-nav { padding: 20px; }
        }
    </style>
</head>

<body>

<div id="page-transition"></div>

<nav class="top-nav">
    <a href="shop.html" class="nav-link-custom"><i class="fas fa-chevron-left me-2"></i> Boutique</a>
    <a href="index.html" style="letter-spacing: 8px; color: var(--gold); font-family: 'Playfair Display'; font-weight: 600; text-decoration: none;">VYRA</a>
    <a href="account.html?tab=cart" class="nav-link-custom">My Collection <i class="fas fa-shopping-bag ms-2"></i></a>
</nav>

<div id="luxury-toast">Added to your collection</div>

<div class="product-wrapper">
    <div class="product-glass-card">
        <div class="image-side">
            <img id="prod-img" src="" alt="Vyra Scent">
        </div>

        <div class="details-side">
            <div class="brand-label">Maison Vyra Paris</div>
            <h1 class="product-title" id="prod-name">Exquisite Essence</h1>
            <span class="category-tag" id="prod-cat">Loading Collection...</span>
            
            <div class="product-price" id="prod-price">₹0.00</div>

            <div class="fragrance-notes">
                <span>Olfactory Composition</span>
                <p id="prod-notes">The spirit of the scent is being gathered...</p>
            </div>

            <div class="qty-selector">
                <span style="font-size: 11px; letter-spacing: 1px; opacity: 0.6;">QUANTITY</span>
                <div class="d-flex align-items-center gap-3">
                    <button class="qty-btn" onclick="updateQty(-1)">-</button>
                    <span id="qty-val">1</span>
                    <button class="qty-btn" onclick="updateQty(1)">+</button>
                </div>
            </div>

            <div class="button-stack">
                <button class="btn-vyra btn-outline add-cart">Acquire to Cart</button>
                <button class="btn-vyra btn-fill buy-now">Reserve Now</button>
            </div>
            
            <p style="margin-top: 40px; font-size: 10px; opacity: 0.4; letter-spacing: 1px;">COMPLIMENTARY SHIPPING ON ALL MAISON VYRA ACQUISITIONS.</p>
        </div>
    </div>
</div>

<script>
    let quantity = 1;

    function updateQty(val) {
        quantity = Math.max(1, quantity + val);
        document.getElementById('qty-val').innerText = quantity;
    }

    async function loadProduct() {
        try {
            const res = await fetch("http://localhost:3000/api/products");
            const products = await res.json();
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id'); 
            const product = products.find(p => p.id == productId);

            if (product) {
                document.getElementById('prod-img').src = "http://localhost:3000" + product.image_url; 
                document.getElementById('prod-name').innerText = product.name.toUpperCase();
                document.getElementById('prod-price').innerText = `₹${product.price}`;
                document.getElementById('prod-notes').innerText = product.notes || "A secret blend of rare botanicals.";
                document.getElementById('prod-cat').innerText = `${product.gender} • ${product.category}`;
                document.title = "Vyra | " + product.name;
            }
        } catch (error) { console.error("Database Error:", error); }
    }

    loadProduct();

    // Cinematic Load
    window.addEventListener('pageshow', () => { document.body.classList.add('page-loaded'); });

    // Secure Add to Cart
    document.querySelector(".add-cart").onclick = async () => {
        const token = localStorage.getItem("jwtToken"); 
        if (!token) { window.location.href = "account.html"; return; }

        const productId = new URLSearchParams(window.location.search).get('id'); 

        try {
            const res = await fetch("http://localhost:3000/api/cart", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ product_id: productId, quantity: quantity }) 
            });
            
            if (res.ok) {
                const toast = document.getElementById('luxury-toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        } catch (error) { console.error(error); }
    };

    document.querySelector('.buy-now').onclick = async () => {
        const token = localStorage.getItem("jwtToken"); 
        if (!token) { window.location.href = "account.html"; return; }

        const productId = new URLSearchParams(window.location.search).get('id'); 

        try {
            // 1. Add item to cart first
            await fetch("http://localhost:3000/api/cart", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ product_id: productId, quantity: quantity }) 
            });
            
            // 2. Transition smoothly to checkout
            document.body.classList.remove('page-loaded');
            setTimeout(() => { window.location.href = 'transactions.html'; }, 500);
        } catch (error) { 
            console.error("Failed to secure item for immediate checkout:", error); 
        }
    };
</script>

</body>
</html>
