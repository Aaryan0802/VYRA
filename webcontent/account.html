<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VYRA | My Essence Portal</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #cfaa6a; 
            --gold-light: #e6d1a8; 
            --gold-glow: rgba(207, 170, 106, 0.2); 
            --glass: rgba(10, 10, 10, 0.9);
            --border: rgba(207, 170, 106, 0.25);
            /* --- Custom Luxury Scrollbar --- */
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: rgba(207, 170, 106, 0.3); border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
        }

        body { 
            background: #050505; 
            color: #f4f4f4; 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .top-nav {
            position: absolute; top: 0; width: 100%; padding: 25px 50px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .nav-back { color: var(--gold); text-decoration: none; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .nav-back:hover { color: white; }

        .account-bg { 
            min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url("/static/story.png"); 
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; padding: 120px 20px 80px; 
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(207, 170, 106, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        .glass-card { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 2px; padding: 50px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); 
            width: 100%; max-width: 450px; transition: all 0.5s ease;
        }

        .dashboard-card { 
            max-width: 1100px; display: none; padding: 0; overflow: hidden; 
            height: 80vh; min-height: 600px; max-height: 900px;
        }

        .sidebar { background: rgba(0,0,0,0.5); padding: 50px 30px; height: 100%; overflow-y: auto; }
        .dashboard-content { height: 100%; padding: 50px; overflow-y: auto; }

        .brand-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 38px; letter-spacing: 10px; color: var(--gold); margin-bottom: 40px; }

        .input-group-custom { position: relative; margin-bottom: 25px; }
        .auth-input { width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; font-size: 14px; outline: none; transition: 0.3s; }
        .auth-input:focus { border-bottom-color: var(--gold); }
        .input-group-custom label { position: absolute; top: 12px; left: 0; color: rgba(255,255,255,0.4); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; pointer-events: none; }
        .auth-input:focus + label, .auth-input:not(:placeholder-shown) + label { top: -15px; color: var(--gold); font-size: 10px; }

        .btn-vyra {
            padding: 14px 35px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; font-size: 11px;
            transition: 0.4s; border: 1px solid var(--gold); text-decoration: none; display: inline-block; text-align: center;
        }
        .btn-fill { background: var(--gold); color: black; }
        .btn-fill:hover { background: white; border-color: white; transform: scale(1.02); }
        .btn-outline { background: transparent; color: var(--gold); }
        .btn-outline:hover { background: var(--gold); color: black; }

        .gold-btn-full { width: 100%; padding: 16px; background: var(--gold); border: none; color: black; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; transition: 0.4s; text-decoration: none; display: inline-block; text-align: center;}
        .gold-btn-full:hover { background: white; transform: scale(1.02); }

        .nav-pills .nav-link { 
            display: flex; align-items: center; white-space: nowrap; 
            color: rgba(255,255,255,0.6) !important; border-radius: 0 !important; margin-bottom: 15px;
            padding: 18px 25px !important; font-size: 11px; letter-spacing: 3px; text-align: left;
            border: 1px solid transparent !important; text-transform: uppercase; transition: 0.3s;
        }
        
        .nav-pills .nav-link i { width: 20px; text-align: center; margin-right: 15px; font-size: 14px; }
        .nav-pills .nav-link:hover { color: white !important; background: rgba(255,255,255,0.02) !important; }
        .nav-pills .nav-link.active { background: transparent !important; color: var(--gold) !important; border: 1px solid var(--gold) !important; }
        
        .nav-pills .admin-btn { border-color: rgba(207, 170, 106, 0.4) !important; color: var(--gold) !important; }
        .nav-pills .admin-btn:hover { background: rgba(207, 170, 106, 0.1) !important; border-color: var(--gold) !important; }

        .cart-img { width: 70px; height: 90px; object-fit: cover; border: 1px solid var(--border); margin-right: 20px; }
        .luxury-card { 
            background: rgba(10,10,10,0.6); border: 1px solid rgba(207,170,106,0.3); 
            padding: 30px; border-radius: 4px; margin-bottom: 25px; transition: 0.3s; 
        }
        .luxury-card:hover { border-color: var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- LUXURY TOAST NOTIFICATION (MOVED TO GLOBAL SCOPE) --- */
        #luxury-toast {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--gold); padding: 20px 40px;
            color: white; z-index: 100000; transform: translateY(250%);
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border-radius: 2px; pointer-events: none;
        }
        #luxury-toast.show { transform: translateY(0); }

        /* --- MOBILE OPTIMIZATION: DASHBOARDS --- */
        @media (max-width: 768px) {
            .account-bg, .care-wrapper { padding: 140px 10px 40px !important; }
            .glass-card { padding: 25px 15px !important; height: auto !important; min-height: auto !important; max-height: none !important; overflow: visible !important; }
            .row.g-0 { flex-direction: column !important; }
            
            /* Turns vertical sidebar into horizontal scrollable tabs */
            .sidebar { width: 100% !important; border-right: none !important; border-bottom: 1px solid var(--border); padding: 20px 10px !important; height: auto !important; overflow-x: auto; }
            .nav-pills { display: flex; flex-direction: row !important; flex-wrap: nowrap; gap: 10px; padding-bottom: 10px; }
            .nav-pills .nav-link { margin-bottom: 0 !important; margin-top: 0 !important; padding: 12px 20px !important; white-space: nowrap; }
            
            .dashboard-content, .content-area { padding: 30px 10px !important; height: auto !important; overflow: visible !important; }
            
            /* Stacks the cart and order cards */
            .luxury-card { flex-direction: column !important; text-align: center !important; padding: 20px !important; gap: 20px; }
            .luxury-card .d-flex { flex-direction: column !important; align-items: center !important; text-align: center !important; gap: 15px !important; }
            .cart-img { margin-right: 0 !important; }
            .luxury-card .text-end { text-align: center !important; }
            .d-flex.justify-content-between.align-items-end { flex-direction: column !important; align-items: center !important; text-align: center !important; gap: 15px !important; }
            .section-header { font-size: 32px !important; text-align: center; }
            .sub-header { text-align: center; }
        }

    </style>
</head>
<body>

<nav class="top-nav">
    <a href="shop.html" class="nav-back"><i class="fas fa-chevron-left me-2"></i> Return to Shop</a>
    <a href="index.html" style="letter-spacing: 8px; color: var(--gold); font-family: 'Playfair Display'; font-weight: 600; text-decoration: none;">VYRA</a>
    <div style="width: 100px;"></div> 
</nav>

<div class="account-bg">
    <div class="glass-card" id="auth-section">
        <div class="brand-title">VYRA</div>
        <form id="authForm">
            <div id="nameField" style="display: none;" class="input-group-custom">
                <input type="text" id="regName" class="auth-input" placeholder=" ">
                <label>Full Name</label>
            </div>
            <div class="input-group-custom">
                <input type="email" id="email" class="auth-input" placeholder=" " required>
                <label>Email Address</label>
            </div>
            <div class="input-group-custom">
                <input type="password" id="password" class="auth-input" placeholder=" " required>
                <label>Secret Password</label>
            </div>
            <button type="submit" class="gold-btn-full" id="authSubmitBtn">Enter Boutique</button>
        </form>
        <p class="text-center mt-5" style="font-size:11px; letter-spacing: 1px;">
            <span id="toggleText" style="opacity: 0.6;">NOT A MEMBER?</span> 
            <span onclick="toggleAuthMode()" id="authToggleLink" style="color:var(--gold); margin-left: 10px; font-weight: 600; cursor:pointer;">CREATE IDENTITY</span>
        </p>
    </div>

    <div class="glass-card dashboard-card" id="dashboard-section">
        <div class="row g-0" style="height: 100%;">
            
            <div class="col-md-4 col-lg-3 sidebar border-end border-warning border-opacity-10">
                <h6 class="text-center mb-5" style="color:var(--gold); letter-spacing: 4px;">PORTAL</h6>
                <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#v-pills-profile"><i class="far fa-id-card"></i> Identity</button>
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-pills-cart" onclick="loadUserCart()"><i class="fas fa-shopping-bag"></i> Collection</button>
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-pills-orders" onclick="loadOrderHistory()"><i class="fas fa-box-open"></i> Acquisitions</button>
                    <button class="nav-link" onclick="window.location.href='customercare.html'"><i class="fas fa-concierge-bell"></i> Concierge</button>
                    <button class="nav-link text-danger" style="margin-top: 30px;" onclick="logout()"><i class="fas fa-lock"></i> Lock Portal</button>
                </div>
            </div>
            
            <div class="col-md-8 col-lg-9 dashboard-content">
                <div class="tab-content">
                    
                    <div class="tab-pane fade show active" id="v-pills-profile">
                        <div class="d-flex justify-content-between align-items-end mb-5">
                            <div>
                                <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:5px;" id="welcomeName">User</h2>
                                <p style="font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin: 0;">CURATE YOUR PERSONAL DETAILS</p>
                            </div>
                            <a href="shop.html" class="btn-vyra btn-outline">Explore Boutique</a>
                        </div>
                        
                        <form id="profileForm">
                            <div class="row g-4">
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editName" class="auth-input" placeholder=" ">
                                    <label>Display Name</label>
                                </div>
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editPhone" class="auth-input" placeholder=" ">
                                    <label>Contact Number</label>
                                </div>
                                <div class="col-12 input-group-custom">
                                    <input type="text" id="editAddress" class="auth-input" placeholder=" ">
                                    <label>Shipping Residence</label>
                                </div>
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editCity" class="auth-input" placeholder=" ">
                                    <label>City / State</label>

                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editZip" class="auth-input" placeholder=" ">

                    </div>

                    <div class="tab-pane fade" id="v-pills-cart">
                        <div class="d-flex justify-content-between align-items-end mb-5">
                            <div>
                                <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:5px;">Your Collection</h2>
                                <p style="font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin: 0; text-transform: uppercase;">Pending Acquisitions</p>
                            </div>

                    <div class="tab-pane fade" id="v-pills-orders">
                        <div class="d-flex justify-content-between align-items-end mb-5">
                            <div>
                                <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:5px;">Acquisition History</h2>
                                <p style="font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin: 0; text-transform: uppercase;">Past Maison Vyra Transactions</p>
                            </div>

                        </div>
                        <div id="orders-list"></div>

                </div>
            </div>
            
        </div>
    </div>
</div>

<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card" style="padding: 40px; width: 100%; border-radius: 2px;">

                        <option value="4" style="color: black;">★★★★☆ - Excellent</option>

                        <option value="1" style="color: black;">★☆☆☆☆ - Poor</option>

</div>

<div id="luxury-toast">Notification</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let isLoginMode = true;

    // --- Luxury Toast Controller ---
    function showToast(message) {
        const toast = document.getElementById('luxury-toast');
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500); // Disappears after 3.5 seconds
    }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("authSubmitBtn").innerText = isLoginMode ? "Enter Boutique" : "Create Identity";
        document.getElementById("nameField").style.display = isLoginMode ? "none" : "block";
        document.getElementById("toggleText").innerText = isLoginMode ? "NOT A MEMBER?" : "ALREADY RECOGNIZED?";
        document.getElementById("authToggleLink").innerText = isLoginMode ? "CREATE IDENTITY" : "SIGN IN";
    }

    document.getElementById("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const endpoint = isLoginMode ? "/api/login" : "/api/register";
        const body = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            fullName: document.getElementById("regName").value
        };

        try {
            const res = await fetch(`${endpoint}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                if (isLoginMode) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    localStorage.setItem("jwtToken", data.token);
                    window.location.reload();
                } else {
                    showToast("Identity Established. Please sign in."); toggleAuthMode();
                }
            } else { 
                showToast(data.message || data.error || "An unknown error occurred."); 
            }
        } catch (err) { console.error(err); }
    });

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = localStorage.getItem("jwtToken");
        const body = {
            fullName: document.getElementById("editName").value,
            phone: document.getElementById("editPhone").value,
            address: document.getElementById("editAddress").value,
            city: document.getElementById("editCity").value,
            postal_code: document.getElementById("editZip").value
        };

        const res = await fetch("/api/update-profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify(body)
        });
        
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem("user", JSON.stringify(data.user));
            showToast("Identity Updated.");
            setTimeout(() => window.location.reload(), 1500);
        }
    });

    async function loadUserCart() {
        const token = localStorage.getItem("jwtToken");
        const list = document.getElementById("cart-list");
        try {
            const res = await fetch("/api/cart", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const items = await res.json();
            
            if (!items.length) {
                list.innerHTML = `
                    <div class="text-center py-5">
                        <p style="color:rgba(255,255,255,0.4); font-size:13px; margin-bottom: 20px;">Your collection is currently empty.</p>
                        <a href="shop.html" class="btn-vyra btn-outline">Explore The Boutique</a>
                    </div>`;
                return;
            }

            list.innerHTML = '';
            items.forEach(item => {
                const cleanPath = item.image_url.startsWith('/') ? item.image_url : '/' + item.image_url;
                const prodId = item.product_id || item.id;
                
                list.innerHTML += `
                <div class="luxury-card d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <img src="${cleanPath}" class="cart-img">
                        <div>
                            <span style="color:white; display:block; font-size:16px; letter-spacing:2px; font-family:'Playfair Display';">${item.name.toUpperCase()}</span>
                            
                            <div class="d-flex align-items-center mt-2">
                                <button type="button" onclick="updateCartQuantity(${prodId}, ${item.quantity - 1})" style="background:transparent; border:1px solid var(--border); color:white; width:25px; height:25px; cursor:pointer; transition:0.3s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">-</button>
                                <span style="margin: 0 15px; font-size: 12px; color: var(--gold);">${item.quantity}</span>
                                <button type="button" onclick="updateCartQuantity(${prodId}, ${item.quantity + 1})" style="background:transparent; border:1px solid var(--border); color:white; width:25px; height:25px; cursor:pointer; transition:0.3s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="text-end">
                        <span style="color:var(--gold); font-size:18px; font-family:'Playfair Display'; display:block; margin-bottom: 5px;">₹${(item.price * item.quantity).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                        <button type="button" onclick="removeFromCart(${prodId})" style="background:transparent; border:none; color:rgba(255,255,255,0.4); font-size:9px; letter-spacing:2px; text-transform:uppercase; transition:0.3s;" onmouseover="this.style.color='#ff4444'" onmouseout="this.style.color='rgba(255,255,255,0.4)'"><i class="fas fa-times me-1"></i> Remove</button>
                    </div>
                </div>`;
            });
            list.innerHTML += `<div class="text-end mt-4"><a href="transactions.html" class="btn-vyra btn-fill">Begin Transaction</a></div>`;
        } catch (e) { console.error(e); }
    }

    async function updateCartQuantity(productId, newQty) {
        if (newQty < 1) {
            removeFromCart(productId); 
            return;
        }
        const token = localStorage.getItem("jwtToken");
        try {
            const res = await fetch(`/api/cart/${productId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ quantity: newQty })
            });
            if (res.ok) loadUserCart(); 
        } catch (e) { console.error("Error updating quantity:", e); }
    }

    async function removeFromCart(productId) {
        const token = localStorage.getItem("jwtToken");
        try {
            const res = await fetch(`/api/cart/${productId}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if(res.ok) {
                loadUserCart(); 
            } else {
                showToast("Failed to remove item from collection.");
            }
        } catch(e) { console.error("Error removing item:", e); }
    }

    async function loadOrderHistory() {
        const token = localStorage.getItem("jwtToken");
        const list = document.getElementById("orders-list");
        list.innerHTML = '<p style="color:rgba(255,255,255,0.4); font-size:13px; letter-spacing:1px;">Accessing archives...</p>';
        
        try {
            const res = await fetch("/api/orders", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            
            if(!res.ok) throw new Error("Could not fetch archives.");
            const orders = await res.json();
            
            if (!orders.length) {
                list.innerHTML = `
                    <div class="text-center py-5">
                        <p style="color:rgba(255,255,255,0.4); font-size:13px; margin-bottom: 20px;">No past acquisitions found in the archives.</p>
                        <a href="shop.html" class="btn-vyra btn-outline">Begin Your Collection</a>
                    </div>`;
                return;
            }

            list.innerHTML = '';
            orders.forEach(order => {
                const date = new Date(order.created_at).toLocaleDateString();
                
                let statusText = order.status.toUpperCase();
                let pillStyle = "background: #ffc107; color: #000;"; 
                if (order.status.toLowerCase() === 'delivered') pillStyle = "background: #4CAF50; color: #fff;"; 
                if (order.status.toLowerCase() === 'shipped') pillStyle = "background: #64B5F6; color: #000;"; 

                list.innerHTML += `
                <div class="luxury-card">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom" style="border-color: rgba(255,255,255,0.05) !important;">
                        <span style="color:var(--gold); font-size:11px; letter-spacing:2px; font-weight:600;">ORDER #${order.id}</span>
                        <span style="color:rgba(255,255,255,0.4); font-size:11px; letter-spacing:1px;">${date}</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span style="color:white; font-size:24px; font-family:'Playfair Display';">₹${parseFloat(order.total_amount).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                        <span style="font-size:9px; letter-spacing:2px; font-weight: 600; padding: 5px 12px; border-radius: 2px; ${pillStyle}">
                            ${statusText}
                        </span>
                    </div>
                    <div style="font-size:10px; color:rgba(255,255,255,0.3); letter-spacing: 1px; font-family: monospace;">
                        Gateway Reference: ${order.razorpay_payment_id || 'Awaiting Payment Confirmation'}
                    </div>
                </div>`;
            });
        } catch (e) { 
            console.error(e);
            list.innerHTML = '<p style="color:rgba(255,255,255,0.4); font-size:13px;">Failed to load order history. Ensure backend route is active.</p>';
        }
    }

    async function openReviewModal() {
        const token = localStorage.getItem("jwtToken");
        try {
            // Hit the new restricted endpoint instead of the public /api/products
            const res = await fetch('/api/purchased-products', {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const products = await res.json();
            const select = document.getElementById('reviewProduct');
            
            select.innerHTML = '<option value="" disabled selected>Select an Essence</option>';
            
            if (!products || products.length === 0) {
                // If they haven't bought anything, lock the dropdown
                select.innerHTML = '<option value="" disabled selected>No past acquisitions available to review</option>';
            } else {
                // Populate only with items they own
                products.forEach(p => {
                    select.innerHTML += `<option value="${p.id}" style="color: black;">${p.name.toUpperCase()}</option>`;
                });
            }
            
            new bootstrap.Modal(document.getElementById('reviewModal')).show();
        } catch(e) {
            console.error(e);
            showToast("Could not verify your collection history.");
        }
    }

    document.getElementById('reviewForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('jwtToken');
        
        const body = {
            product_id: document.getElementById('reviewProduct').value,
            reviewer_name: user.full_name, 
            rating: document.getElementById('reviewRating').value,
            comment: document.getElementById('reviewComment').value
        };

        try {
            const res = await fetch('/api/reviews', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });
            
            if(res.ok) {
                showToast("Thank you. Your impression has been recorded in the boutique archives.");
                bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
                document.getElementById('reviewForm').reset();
            } else {
                showToast("Failed to submit the impression.");
            }
        } catch(e) { console.error(e); }
    });

    function logout() { localStorage.clear(); window.location.href = "account.html"; }

    window.onload = () => {
        const user = JSON.parse(localStorage.getItem("user"));
        if (user) {
            document.getElementById("auth-section").style.display = "none";
            document.getElementById("dashboard-section").style.display = "block";
            document.getElementById("welcomeName").innerText = user.full_name.toUpperCase();
            
            document.getElementById("editName").value = user.full_name || '';
            document.getElementById("editPhone").value = user.phone || '';
            document.getElementById("editAddress").value = user.address || '';
            document.getElementById("editCity").value = user.city || '';
            document.getElementById("editZip").value = user.postal_code || '';
            
            if (user.role && user.role.toLowerCase() === 'admin') {
                const tabList = document.getElementById('v-pills-tab');
                const conciergeLink = tabList.children[3]; 
                conciergeLink.insertAdjacentHTML('beforebegin', `
                    <button class="nav-link admin-btn" onclick="window.location.href='admin.html'">
                        <i class="fas fa-crown"></i> Grand Atelier
                    </button>
                `);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const targetTab = urlParams.get('tab');
            
            if (targetTab === 'cart') {
                const cartTab = new bootstrap.Tab(document.querySelector('[data-bs-target="#v-pills-cart"]'));
                cartTab.show();
                loadUserCart();
            } else if (targetTab === 'orders') {
                const ordersTab = new bootstrap.Tab(document.querySelector('[data-bs-target="#v-pills-orders"]'));
                ordersTab.show();
                loadOrderHistory();
            }
        }
    };
</script>
</body>
</html>
