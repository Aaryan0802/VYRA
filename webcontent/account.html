<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VYRA | My Essence Portal</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #cfaa6a; 
            --gold-light: #e6d1a8; 
            --gold-glow: rgba(207, 170, 106, 0.2); 
            --glass: rgba(10, 10, 10, 0.85);
            --border: rgba(207, 170, 106, 0.15);
        }

        body { 
            background: #050505; 
            color: #f4f4f4; 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Essential Navigation Bar */
        .top-nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-back {
            color: var(--gold);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-back:hover { color: white; }

        .account-bg { 
            min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("/static/story.png"); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 80px 20px; 
        }

        /* Refined Glassmorphism */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 2px; 
            padding: 50px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.9); 
            width: 100%; 
            max-width: 450px; 
            transition: all 0.5s ease;
        }

        .dashboard-card { max-width: 1100px; display: none; padding: 0; overflow: hidden; }

        .brand-title { 
            text-align: center; 
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            letter-spacing: 10px; 
            color: var(--gold); 
            margin-bottom: 40px; 
        }

        /* Identity Elements: Floating Inputs */
        .input-group-custom { position: relative; margin-bottom: 25px; }
        
        .auth-input { 
            width: 100%; 
            padding: 12px 0; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid var(--border); 
            color: white; 
            font-size: 14px; 
            outline: none; 
            transition: 0.3s;
        }

        .auth-input:focus { border-bottom-color: var(--gold); }

        .input-group-custom label {
            position: absolute;
            top: 12px;
            left: 0;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            pointer-events: none;
        }

        .auth-input:focus + label, .auth-input:not(:placeholder-shown) + label {
            top: -15px;
            color: var(--gold);
            font-size: 10px;
        }

        .gold-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--gold); 
            border: none; 
            color: black; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            cursor: pointer; 
            transition: 0.4s; 
            text-decoration: none; 
            display: inline-block;
            text-align: center;
        }

        .gold-btn:hover { background: white; transform: scale(1.02); }

        /* Sidebar Navigation Refined */
        .sidebar { background: rgba(0,0,0,0.3); padding: 40px 20px; }

        .nav-pills .nav-link { 
            color: rgba(255,255,255,0.6) !important; 
            border-radius: 0 !important; 
            margin-bottom: 10px;
            padding: 12px 20px !important; 
            font-size: 13px;
            letter-spacing: 1px;
            text-align: left;
            border: 1px solid transparent !important;
        }

        .nav-pills .nav-link.active { 
            background: transparent !important; 
            color: var(--gold) !important; 
            border: 1px solid var(--gold) !important;
        }

        .cart-img {
            width: 70px;
            height: 90px;
            object-fit: cover;
            border: 1px solid var(--border);
            margin-right: 20px;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="shop.html" class="nav-back"><i class="fas fa-chevron-left me-2"></i> Return to Shop</a>
    <div style="letter-spacing: 5px; color: var(--gold); font-family: 'Playfair Display';">MAISON VYRA</div>
    <div style="width: 100px;"></div> </nav>

<div class="account-bg">
    <div class="glass-card" id="auth-section">
        <div class="brand-title">VYRA</div>
        <form id="authForm">
            <div id="nameField" style="display: none;" class="input-group-custom">
                <input type="text" id="regName" class="auth-input" placeholder=" ">
                <label>Full Name</label>
            </div>
            <div class="input-group-custom">
                <input type="email" id="email" class="auth-input" placeholder=" " required>
                <label>Email Address</label>
            </div>
            <div class="input-group-custom">
                <input type="password" id="password" class="auth-input" placeholder=" " required>
                <label>Secret Password</label>
            </div>
            <button type="submit" class="gold-btn" id="authSubmitBtn">Enter Boutique</button>
        </form>
        <p class="text-center mt-5" style="font-size:11px; letter-spacing: 1px;">
            <span id="toggleText">NOT A MEMBER?</span> 
            <span onclick="toggleAuthMode()" id="authToggleLink" style="color:var(--gold); cursor:pointer; margin-left: 10px; font-weight: 600;">CREATE IDENTITY</span>
        </p>
    </div>

    <div class="glass-card dashboard-card" id="dashboard-section">
        <div class="row g-0">
            <div class="col-md-3 sidebar border-end border-warning border-opacity-10">
                <h6 class="text-center mb-5" style="color:var(--gold); letter-spacing: 3px;">PORTAL</h6>
                <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#v-pills-profile"><i class="far fa-user me-3"></i> Identity</button>
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#v-pills-cart" onclick="loadUserCart()"><i class="fas fa-shopping-bag me-3"></i> Collection</button>
                    <button class="nav-link text-danger mt-5" onclick="logout()"><i class="fas fa-sign-out-alt me-3"></i> Exit</button>
                </div>
            </div>
            <div class="col-md-9 p-5">
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="v-pills-profile">
                        <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:10px;" id="welcomeName">User</h2>
                        <p style="font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 40px; letter-spacing: 1px;">CURATE YOUR PERSONAL DETAILS</p>
                        
                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editName" class="auth-input" placeholder=" ">
                                    <label>Display Name</label>
                                </div>
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editPhone" class="auth-input" placeholder=" ">
                                    <label>Contact Number</label>
                                </div>
                                <div class="col-12 input-group-custom">
                                    <input type="text" id="editAddress" class="auth-input" placeholder=" ">
                                    <label>Shipping Residence</label>
                                </div>
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editCity" class="auth-input" placeholder=" ">
                                    <label>City / State</label>
                                </div>
                                <div class="col-md-6 input-group-custom">
                                    <input type="text" id="editZip" class="auth-input" placeholder=" ">
                                    <label>Postal Code</label>
                                </div>
                            </div>
                            <button type="submit" class="gold-btn mt-4" style="width:auto; padding:12px 50px;">Update Identity</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="v-pills-cart">
                        <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:10px;">Your Collection</h2>
                        <p style="font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 40px; letter-spacing: 1px;">PENDING ACQUISITIONS</p>
                        <div id="cart-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Logic remains identical to your working version but updated with refined UI calls
    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("authSubmitBtn").innerText = isLoginMode ? "Enter Boutique" : "Create Identity";
        document.getElementById("nameField").style.display = isLoginMode ? "none" : "block";
        document.getElementById("toggleText").innerText = isLoginMode ? "NOT A MEMBER?" : "ALREADY RECOGNIZED?";
        document.getElementById("authToggleLink").innerText = isLoginMode ? "CREATE IDENTITY" : "SIGN IN";
    }

    document.getElementById("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const endpoint = isLoginMode ? "/api/login" : "/api/register";
        const body = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            fullName: document.getElementById("regName").value
        };

        try {
            const res = await fetch(`http://localhost:3000${endpoint}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                if (isLoginMode) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    localStorage.setItem("jwtToken", data.token);
                    window.location.reload();
                } else {
                    alert("Identity Established."); toggleAuthMode();
                }
            } else { alert(data.message); }
        } catch (err) { console.error(err); }
    });

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = localStorage.getItem("jwtToken");
        const body = {
            fullName: document.getElementById("editName").value,
            phone: document.getElementById("editPhone").value,
            address: document.getElementById("editAddress").value,
            city: document.getElementById("editCity").value,
            postal_code: document.getElementById("editZip").value
        };

        const res = await fetch("http://localhost:3000/api/update-profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify(body)
        });
        
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem("user", JSON.stringify(data.user));
            alert("Identity Updated.");
            window.location.reload();
        }
    });

    async function loadUserCart() {
        const token = localStorage.getItem("jwtToken");
        const list = document.getElementById("cart-list");
        try {
            const res = await fetch("http://localhost:3000/api/cart", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const items = await res.json();
            list.innerHTML = items.length ? '' : '<p style="color:gray; font-size:13px;">No items in your collection.</p>';
            
            items.forEach(item => {
                const cleanPath = item.image_url.startsWith('/') ? item.image_url : '/' + item.image_url;
                list.innerHTML += `
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-warning border-opacity-10 pb-3">
                    <div class="d-flex align-items-center">
                        <img src="http://localhost:3000${cleanPath}" class="cart-img">
                        <div>
                            <span style="color:white; display:block; font-size:14px; letter-spacing:1px;">${item.name.toUpperCase()}</span>
                            <small style="color:var(--gold); font-size:10px;">QUANTITY: ${item.quantity}</small>
                        </div>
                    </div>
                    <span style="color:white; font-size:14px;">₹${item.price * item.quantity}</span>
                </div>`;
            });
            if(items.length) list.innerHTML += `<a href="transactions.html" class="gold-btn mt-4">Begin Transaction</a>`;
        } catch (e) { console.error(e); }
    }

    function logout() { localStorage.clear(); window.location.href = "account.html"; }

    window.onload = () => {
        const user = JSON.parse(localStorage.getItem("user"));
        if (user) {
            document.getElementById("auth-section").style.display = "none";
            document.getElementById("dashboard-section").style.display = "block";
            document.getElementById("welcomeName").innerText = user.full_name.toUpperCase();
            
            document.getElementById("editName").value = user.full_name || '';
            document.getElementById("editPhone").value = user.phone || '';
            document.getElementById("editAddress").value = user.address || '';
            document.getElementById("editCity").value = user.city || '';
            document.getElementById("editZip").value = user.postal_code || '';
            
            loadUserCart();
        }
    };
</script>
</body>
</html>
